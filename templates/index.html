<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? 🍱</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId={{ client_id }}&submodules=geocoder"></script>
    <style>
        :root { --deep-green: #064e3b; --dark-black: #0a0a0a; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--dark-black); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 1.8rem; margin: 50px 0; font-weight: 800; }

        .start-btn { 
            width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold;
            background: var(--deep-green); color: white; border: none; border-radius: 16px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .step-box { display: none; background: #171717; padding: 25px; border-radius: 24px; margin-top: 20px; animation: slideUp 0.4s ease-out; }
        h3 { margin-top: 0; font-size: 1.1rem; color: #a3a3a3; margin-bottom: 20px; }
        
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { 
            background: #262626; color: white; border: none; padding: 18px; 
            border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .opt-btn:hover { background: var(--deep-green); }

        .result-item { 
            background: white; color: #111; border-radius: 16px; padding: 20px; 
            margin-bottom: 12px; text-align: left; animation: fadeIn 0.5s ease;
        }
        .item-name { font-weight: 800; font-size: 1.15rem; margin-bottom: 5px; }
        .item-info { font-size: 0.85rem; color: #666; margin-bottom: 12px; }
        .item-link { color: var(--deep-green); text-decoration: none; font-weight: bold; font-size: 0.9rem; border: 1px solid var(--deep-green); padding: 5px 10px; border-radius: 8px; }

        /* 수동 입력창 스타일 */
        .manual-input { width: 80%; padding: 10px; border-radius: 8px; border: none; margin-bottom: 10px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🍱 오늘 뭐 먹지?</h1>
    <button id="startBtn" class="start-btn" onclick="startLocation()">📍 내 주변 맛집 찾기</button>

    <div id="manualStep" class="step-box">
        <h3>위치를 찾을 수 없어요 😢<br>동네 이름을 입력해 주세요.</h3>
        <input type="text" id="manualAddr" class="manual-input" placeholder="예: 역삼동, 한남동">
        <button class="opt-btn" style="width:100%; background:var(--deep-green);" onclick="setManualAddr()">확인</button>
    </div>

    <div id="step1" class="step-box">
        <h3>어떤 종류가 당기시나요?</h3>
        <div class="option-grid">
            <button class="opt-btn" onclick="selectFood('한식')">한식 🍚</button>
            <button class="opt-btn" onclick="selectFood('중식')">중식 🥢</button>
            <button class="opt-btn" onclick="selectFood('일식')">일식 🍣</button>
            <button class="opt-btn" onclick="selectFood('양식')">양식 🍝</button>
        </div>
    </div>

    <div id="step2" class="step-box">
        <h3>얼마나 걸어가실 건가요?</h3>
        <div class="option-grid">
            <button class="opt-btn" onclick="fetchFinal(5)">🚶 5분 거리</button>
            <button class="opt-btn" onclick="fetchFinal(10)">🚶 10분 거리</button>
            <button class="opt-btn" onclick="fetchFinal(15)">🏃 15분 거리</button>
            <button class="opt-btn" onclick="fetchFinal(20)">🏃 20분 거리</button>
        </div>
    </div>

    <div id="resultArea" style="margin-top: 30px;"></div>
</div>

<script>
let currentAddr = "서울 강남역"; 
let currentFood = "";

function showStep(stepId) {
    // 모든 박스 숨기기
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('manualStep').style.display = 'none';
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'none';
    
    // 타겟만 보이기
    if(stepId) document.getElementById(stepId).style.display = 'block';
}

function startLocation() {
    const btn = document.getElementById('startBtn');
    btn.innerText = "📍 위치 파악 중...";
    btn.disabled = true;

    if (!navigator.geolocation) {
        showStep('manualStep');
        return;
    }

    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        
        if (typeof naver !== 'undefined' && naver.maps.Service) {
           naver.maps.Service.reverseGeocode({
                coords: new naver.maps.LatLng(lat, lng)
            }, (status, res) => {
                if (status === naver.maps.Service.Status.OK && res.v2 && res.v2.address) {
                    currentAddr = res.v2.address.jibunAddress || res.v2.address.roadAddress;
                    console.log("주소 획득 성공:", currentAddr);
                } else {
                    // [이 부분 추가] 에러가 나면 알림창을 띄워 원인 파악
                    alert("네이버 API 주소 변환 실패! NCP 콘솔에서 'Reverse Geocoding' 권한과 'Web 서비스 URL' 등록을 확인하세요.");
                    console.error("Geocode Error Status:", status);
                }
                showStep('step1');
            });
        } else {
            showStep('step1');
        }
    }, (error) => {
        console.warn("GPS 실패:", error.message);
        showStep('manualStep'); // 실패 시 수동 입력창으로 전환
    }, { enableHighAccuracy: false, timeout: 5000 });
}

function setManualAddr() {
    const val = document.getElementById('manualAddr').value;
    if(val.trim() !== "") currentAddr = val;
    showStep('step1');
}

function selectFood(food) {
    currentFood = food;
    showStep('step2');
}

function fetchFinal(minutes) {
    showStep(null); 
    const resArea = document.getElementById('resultArea');
    resArea.innerHTML = "<p style='color:#666;'>✨ 최적의 맛집을 찾는 중...</p>";

    fetch(`/recommend_v2?location=${encodeURIComponent(currentAddr)}&food=${encodeURIComponent(currentFood)}`)
        .then(res => res.json())
        .then(data => {
            resArea.innerHTML = `<h2 style='text-align:left; font-size:1.1rem; color:#888;'>📍 ${currentAddr} 추천</h2>`;
            if (!data.items || data.items.length === 0) {
                resArea.innerHTML += "<p>근처에 맛집이 없습니다. 동네 이름을 정확히 입력해 보세요!</p>";
                resArea.innerHTML += `<button onclick="location.reload()" class="opt-btn" style="width:100%;">다시 시도</button>`;
                return;
            }
            data.items.forEach(item => {
                resArea.innerHTML += `
                    <div class="result-item">
                        <div style="font-size:0.75rem; color:var(--deep-green); font-weight:bold; margin-bottom:4px;">${item.category}</div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-info">📍 ${item.address}<br>🚶 도보 약 ${minutes}분</div>
                        <a href="${item.link}" target="_blank" class="item-link">네이버 플레이스 ➔</a>
                    </div>
                `;
            });
            resArea.innerHTML += `<button onclick="location.reload()" class="opt-btn" style="width:100%; margin-top:20px; background:#444;">처음부터 다시하기</button>`;
        }).catch(() => {
            resArea.innerHTML = "<p>서버 연결에 실패했습니다.</p>";
        });
}
</script>
</body>
</html>
