<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? 🍱</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId={{ client_id }}&submodules=geocoder"></script>
    <style>
        /* 짙은 녹색과 검정 테마 설정 */
        :root {
            --deep-green: #064e3b; /* 짙은 녹색 */
            --dark-black: #111827; /* 세련된 검정 */
            --soft-gray: #f3f4f6;
        }

        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: var(--dark-black); 
            margin: 0; padding: 20px; color: white;
            display: flex; justify-content: center;
        }

        .container { width: 100%; max-width: 450px; text-align: center; }
        
        h1 { margin-bottom: 30px; font-size: 1.8rem; font-weight: 700; color: #fff; }
        
        /* 검색창 디자인 */
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { 
            flex: 1; padding: 14px; border: none; border-radius: 12px; 
            background: #1f2937; color: white; outline: none; font-size: 1rem;
        }
        input:focus { box-shadow: 0 0 0 2px var(--deep-green); }
        
        button { 
            background: var(--deep-green); color: white; border: none; 
            padding: 14px 24px; border-radius: 12px; cursor: pointer; 
            font-weight: bold; transition: all 0.3s ease;
        }
        button:hover { background: #065f46; transform: scale(1.05); }

        /* 맛집 카드 디자인 및 부드러운 애니메이션 */
        .card { 
            display: none; background: #ffffff; border-radius: 24px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: left; color: #111;
            animation: fadeInSlide 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-content { padding: 24px; }
        .badge { 
            display: inline-block; background: #ecfdf5; color: var(--deep-green); 
            font-size: 0.75rem; padding: 4px 12px; border-radius: 99px; font-weight: 700; 
        }
        .title { font-size: 1.7rem; font-weight: 800; margin: 12px 0 8px 0; color: var(--dark-black); }
        
        .info { font-size: 0.95rem; color: #4b5563; margin-bottom: 12px; line-height: 1.5; }
        .rating { color: #fbbf24; font-size: 1.1rem; margin-bottom: 15px; }

        #map { width: 100%; height: 230px; background: #e5e7eb; }
        
        .btn-link { 
            display: block; text-align: center; padding: 16px; 
            background: var(--dark-black); color: white; text-decoration: none; 
            font-weight: bold; border-radius: 12px; margin-top: 15px; transition: background 0.3s;
        }
        .btn-link:hover { background: #374151; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍱 오늘 뭐 먹지?</h1>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="어디서 드실 건가요?">
        <button onclick="startSearch()">추천받기</button>
    </div>

    <div id="resultCard" class="card">
        <div id="map"></div>
        <div class="card-content">
            <span id="category" class="badge">카테고리</span>
            <div id="placeName" class="title">맛집 이름</div>
            <div class="rating">★★★★★ <span style="color:#9ca3af; font-size:0.85rem; font-weight:400;">(방문자리뷰 100+)</span></div>
            <div id="address" class="info">📍 주소를 불러오는 중...</div>
            <a id="naverLink" href="#" target="_blank" class="btn-link">네이버 상세 정보 ➔</a>
        </div>
    </div>
</div>

<script>
let map = null;
let marker = null;

function startSearch() {
    const userInput = document.getElementById('query').value;
    const btn = document.querySelector('button');
    btn.innerText = "찾는 중...";
    btn.disabled = true;
    
    if (userInput) {
        fetchRecommend(userInput);
    } else {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                naver.maps.Service.reverseGeocode({ coords: new naver.maps.LatLng(lat, lng) }, (status, res) => {
                    const addr = (res.v2 && res.v2.address.jibunAddress) ? res.v2.address.jibunAddress : "강남역";
                    fetchRecommend(addr + " 맛집");
                });
            }, () => fetchRecommend("강남역 맛집"));
        } else {
            fetchRecommend("강남역 맛집");
        }
    }
}

function fetchRecommend(query) {
    fetch(`/recommend?query=${query}`)
        .then(res => res.json())
        .then(data => {
            const btn = document.querySelector('button');
            btn.innerText = "추천받기";
            btn.disabled = false;

            if (data.error) return alert(data.error);

            // 카드 보이기 및 애니메이션 초기화
            const card = document.getElementById('resultCard');
            card.style.display = 'block';
            
            document.getElementById('placeName').innerText = data.name;
            document.getElementById('category').innerText = data.category;
            document.getElementById('address').innerText = `📍 ${data.address}`;
            document.getElementById('naverLink').href = data.link || `https://search.naver.com/search.naver?query=${data.name}`;

            const point = new naver.maps.Point(data.mapx, data.mapy);
            const latlng = naver.maps.TransCoord.fromTM128ToLatLng(point);

            if (!map) {
                map = new naver.maps.Map('map', { center: latlng, zoom: 16 });
                marker = new naver.maps.Marker({ position: latlng, map: map });
            } else {
                map.setCenter(latlng);
                marker.setPosition(latlng);
            }
        });
}
</script>

</body>
</html>
