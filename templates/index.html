<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Today's Stock Hot-Topic</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --primary: #007bff; --bg: #f4f7f6; }
        body { font-family: 'Pretendard', sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; background: var(--bg); color: #333; }
        h2 { font-weight: 800; letter-spacing: -1px; }
        
        /* 테마 탭 */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; white-space: nowrap; }
        .tab-btn { padding: 10px 18px; border: none; border-radius: 25px; cursor: pointer; background: #fff; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }

        /* 종목 TOP 5 카드 */
        .stock-list { display: flex; gap: 8px; margin-bottom: 25px; overflow-x: auto; padding: 5px 0; }
        .stock-badge { min-width: 90px; padding: 12px; background: white; border-radius: 12px; cursor: pointer; text-align: center; border: 2px solid transparent; transition: 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stock-badge.active { border-color: var(--primary); transform: translateY(-3px); }
        .stock-name { font-weight: 700; font-size: 14px; }
        .stock-count { font-size: 11px; color: #888; margin-top: 4px; }

        /* 뉴스 피드 */
        .news-container { background: white; border-radius: 18px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .news-header { font-weight: 700; margin-bottom: 15px; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        .update-tag { font-size: 11px; color: #10b981; font-weight: normal; }
        .news-item { padding: 16px 0; border-bottom: 1px solid #f0f0f0; transition: 0.2s; }
        .news-item:last-child { border-bottom: none; }
        .news-item a { text-decoration: none; color: inherit; }
        .news-item .title { font-size: 15px; line-height: 1.4; font-weight: 500; margin-bottom: 6px; display: block; }
        .news-item .meta { color: #999; font-size: 12px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <h2>📈 테마별 뉴스 TOP 5</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="loadTopStocks('반도체', this)">반도체</button>
        <button class="tab-btn" onclick="loadTopStocks('2차전지', this)">2차전지</button>
        <button class="tab-btn" onclick="loadTopStocks('AI/로봇', this)">AI/로봇</button>
        <button class="tab-btn" onclick="loadTopStocks('바이오', this)">바이오</button>
    </div>

    <div id="stock-list" class="stock-list"></div>

    <div class="news-container">
        <div class="news-header">
            <span id="news-title">최신 뉴스</span>
            <span class="update-tag">● 실시간 업데이트 중</span>
        </div>
        <div id="news-list"></div>
    </div>

    <script>
        function timeAgo(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = Math.floor((now - date) / 1000 / 60);
            if (diff < 1) return '방금 전';
            if (diff < 60) return `${diff}분 전`;
            if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
            return `${date.getFullYear()}.${date.getMonth()+1}.${date.getDate()}`;
        }

        function loadTopStocks(theme, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            fetch(`/get_top_stocks?theme=${theme}`)
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('stock-list');
                    list.innerHTML = data.map((s, i) => `
                        <div class="stock-badge ${i===0?'active':''}" onclick="loadNews('${s.name}', this)">
                            <div class="stock-name">${s.name}</div>
                            <div class="stock-count">급상승 ${s.count}회</div>
                        </div>
                    `).join('');
                    if(data.length > 0) loadNews(data[0].name);
                });
        }

        function loadNews(stock, element) {
            if(element) {
                document.querySelectorAll('.stock-badge').forEach(b => b.classList.remove('active'));
                element.classList.add('active');
            }
            document.getElementById('news-title').innerText = `${stock}`;

            fetch(`/get_stock_news?stock=${stock}`)
                .then(res => res.json())
                .then(data => {
                    const list = document.getElementById('news-list');
                    list.innerHTML = data.map(n => `
                        <div class="news-item">
                            <a href="${n.link}" target="_blank">
                                <span class="title">${n.title}</span>
                                <div class="meta">
                                    <span>${timeAgo(n.pubDate)}</span>
                                    <span>•</span>
                                    <span>자세히 보기</span>
                                </div>
                            </a>
                        </div>
                    `).join('');
                });
        }

        window.onload = () => loadTopStocks('반도체', document.querySelector('.tab-btn'));
    </script>
</body>
</html>
