<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? 🍱</title>
    <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId={{ client_id }}&submodules=geocoder"></script>
    <style>
        :root { --deep-green: #064e3b; --dark-black: #0a0a0a; --accent-green: #10b981; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--dark-black); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        
        h1 { font-size: 1.8rem; margin: 40px 0; font-weight: 800; letter-spacing: -1px; }

        /* 메인 시작 버튼 */
        .start-btn { 
            width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold;
            background: var(--deep-green); color: white; border: none; border-radius: 16px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .start-btn:active { transform: scale(0.95); }

        /* 단계별 박스 */
        .step-box { display: none; background: #171717; padding: 25px; border-radius: 24px; margin-top: 20px; animation: slideUp 0.4s ease-out; }
        h3 { margin-top: 0; font-size: 1.1rem; color: #a3a3a3; }
        
        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .opt-btn { 
            background: #262626; color: white; border: none; padding: 16px; 
            border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s;
        }
        .opt-btn:hover { background: var(--deep-green); }

        /* 결과 카드 */
        .result-item { 
            background: white; color: #111; border-radius: 16px; padding: 18px; 
            margin-bottom: 12px; text-align: left; animation: fadeIn 0.5s ease;
        }
        .item-name { font-weight: 800; font-size: 1.1rem; margin-bottom: 4px; }
        .item-info { font-size: 0.85rem; color: #666; margin-bottom: 10px; }
        .item-link { color: var(--deep-green); text-decoration: none; font-weight: bold; font-size: 0.85rem; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🍱 오늘 뭐 먹지?</h1>
    
    <button id="startBtn" class="start-btn" onclick="startLocation()">📍 내 주변 맛집 찾기</button>

    <div id="step1" class="step-box">
        <h3>어떤 종류가 당기시나요?</h3>
        <div class="option-grid">
            <button class="opt-btn" onclick="selectFood('한식')">한식 🍚</button>
            <button class="opt-btn" onclick="selectFood('중식')">중식 🥢</button>
            <button class="opt-btn" onclick="selectFood('일식')">일식 🍣</button>
            <button class="opt-btn" onclick="selectFood('양식')">양식 🍝</button>
        </div>
    </div>

    <div id="step2" class="step-box">
        <h3>얼마나 걸어가실 건가요?</h3>
        <div class="option-grid">
            <button class="opt-btn" onclick="fetchFinal(5)">🚶 5분 거리</button>
            <button class="opt-btn" onclick="fetchFinal(10)">🚶 10분 거리</button>
            <button class="opt-btn" onclick="fetchFinal(15)">🏃 15분 거리</button>
            <button class="opt-btn" onclick="fetchFinal(20)">🏃 20분 거리</button>
        </div>
    </div>

    <div id="resultArea" style="margin-top: 30px;"></div>
</div>

<script>
let currentAddr = "";
let currentFood = "";

function startLocation() {
    const btn = document.getElementById('startBtn');
    btn.innerText = "📍 위치 파악 중...";
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            
            naver.maps.Service.reverseGeocode({
                coords: new naver.maps.LatLng(lat, lng)
            }, (status, res) => {
                currentAddr = res.v2.address.jibunAddress || "내 주변";
                btn.style.display = 'none';
                document.getElementById('step1').style.display = 'block';
            });
        }, () => alert("위치 권한을 허용해주세요!"));
    }
}

function selectFood(food) {
    currentFood = food;
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
}

function fetchFinal(minutes) {
    document.getElementById('step2').style.display = 'none';
    const resArea = document.getElementById('resultArea');
    resArea.innerHTML = "<p style='color:#a3a3a3;'>가장 맛있는 곳을 고르는 중...</p>";

    fetch(`/recommend_v2?location=${currentAddr}&food=${currentFood}`)
        .then(res => res.json())
        .then(data => {
            resArea.innerHTML = `<h2 style='text-align:left; font-size:1.2rem;'>✨ 추천 ${currentFood} TOP 5</h2>`;
            data.items.forEach(item => {
                resArea.innerHTML += `
                    <div class="result-item">
                        <div style="font-size:0.7rem; color:var(--deep-green); font-weight:bold; margin-bottom:5px;">${item.category}</div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-info">📍 ${item.address} (도보 약 ${minutes}분)</div>
                        <a href="${item.link || '#'}" target="_blank" class="item-link">네이버 플레이스 ➔</a>
                    </div>
                `;
            });
        });
}
</script>
</body>
</html>
