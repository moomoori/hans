<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? 🍱</title>
    <style>
        :root { --main-green: #064e3b; --bg-black: #0a0a0a; --card-bg: #171717; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg-black); color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; text-align: center; }
        h1 { font-size: 2rem; margin: 40px 0; font-weight: 800; }

        .step-box { background: var(--card-bg); padding: 30px; border-radius: 24px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h3 { margin-top: 0; color: #a3a3a3; font-size: 1.1rem; margin-bottom: 20px; line-height: 1.5; }

        .manual-input { 
            width: 100%; padding: 18px; border-radius: 12px; border: 1px solid #333; 
            background: #262626; color: white; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px;
        }

        .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { 
            background: #262626; color: white; border: none; padding: 18px; 
            border-radius: 12px; cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: bold;
        }
        .opt-btn:hover { background: var(--main-green); }

        .result-item { 
            background: #ffffff; color: #111; border-radius: 18px; padding: 20px; 
            margin-bottom: 15px; text-align: left; transition: transform 0.2s;
            cursor: pointer; position: relative;
        }
        .result-item:active { transform: scale(0.98); }
        .item-category { font-size: 0.75rem; color: var(--main-green); font-weight: bold; margin-bottom: 4px; }
        .item-name { font-weight: 800; font-size: 1.2rem; margin-bottom: 6px; }
        .item-info { font-size: 0.85rem; color: #555; }
        .go-map { position: absolute; right: 20px; bottom: 20px; font-size: 0.8rem; color: #888; }

        #moreBtn { background: #333; width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 12px; color: white; cursor: pointer; }
        .reset-btn { background: transparent; color: #666; border: none; margin-top: 30px; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>🍱 오늘 뭐 먹지?</h1>
    
    <div id="step0" class="step-box">
        <h3>📍 어디서 드시나요?<br><span style="font-size:0.8rem; font-weight:normal;">동네 이름을 입력해 주세요 (예: 역삼동)</span></h3>
        <input type="text" id="userLocation" class="manual-input" placeholder="동네나 역 이름 입력">
        <button class="opt-btn" style="width:100%; background:var(--main-green);" onclick="goToFood()">맛집 찾기</button>
    </div>

    <div id="step1" class="step-box" style="display:none;">
        <h3 id="locationTitle"></h3>
        <div class="option-grid">
            <button class="opt-btn" onclick="fetchResults('한식')">한식 🍚</button>
            <button class="opt-btn" onclick="fetchResults('중식')">중식 🥢</button>
            <button class="opt-btn" onclick="fetchResults('일식')">일식 🍣</button>
            <button class="opt-btn" onclick="fetchResults('양식')">양식 🍝</button>
        </div>
    </div>

    <div id="resultArea" style="margin-top: 30px;"></div>
    <div id="buttonArea" style="margin-bottom: 50px;"></div>
</div>

<script>
let selectedLocation = "";
let currentCategory = "";
let startOffset = 1;

function goToFood() {
    const loc = document.getElementById('userLocation').value;
    if (!loc.trim()) {
        alert("지역을 입력해 주세요!");
        return;
    }
    selectedLocation = loc;
    document.getElementById('step0').style.display = 'none';
    document.getElementById('step1').style.display = 'block';
    document.getElementById('locationTitle').innerText = `📍 ${selectedLocation}\n어떤 음식이 당기시나요?`;
}

function fetchResults(food, isMore = false) {
    if (!isMore) {
        startOffset = 1;
        currentCategory = food;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('resultArea').innerHTML = "<p style='color:#666;'>✨ 리뷰 많은 맛집을 엄선 중...</p>";
        document.getElementById('buttonArea').innerHTML = "";
    }

    fetch(`/recommend_v2?location=${selectedLocation}&food=${food}&start=${startOffset}`)
        .then(res => res.json())
        .then(data => {
            const resArea = document.getElementById('resultArea');
            const btnArea = document.getElementById('buttonArea');
            
            if (!isMore) {
                resArea.innerHTML = `<h2 style='text-align:left; font-size:1.2rem; margin-bottom:20px;'>🔥 ${selectedLocation} ${food} 베스트</h2>`;
            }

            if (!data.items || data.items.length === 0) {
                if (!isMore) resArea.innerHTML = "<p>검색 결과가 없습니다.</p>";
                else alert("더 이상 결과가 없습니다.");
                return;
            }

            data.items.forEach(item => {
                resArea.innerHTML += `
                    <div class="result-item" onclick="window.open('${item.map_url}', '_blank')">
                        <div class="item-category">${item.category}</div>
                        <div class="item-name">${item.name}</div>
                        <div class="item-info">📍 ${item.address}</div>
                        <div class="go-map">지도보기 ➔</div>
                    </div>
                `;
            });

            // 더보기 버튼 제어
            startOffset += 10;
            let btns = "";
            if (startOffset <= 90) { // 네이버 API 최대 100개 제한
                btns += `<button id="moreBtn" onclick="fetchResults('${food}', true)">맛집 10개 더보기 (+)</button>`;
            }
            btns += `<button class="reset-btn" onclick="location.reload()">처음으로 돌아가기</button>`;
            btnArea.innerHTML = btns;
        });
}
</script>
</body>
</html>
